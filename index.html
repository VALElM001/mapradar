<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мировой Мониторинг Тревог</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0f172a; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .legend { background: rgba(15, 23, 42, 0.9); color: white; padding: 12px; border-radius: 8px; border: 1px solid #334155; }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Центрируем карту мира
    const map = L.map('map').setView([40.0, 20.0], 3);

    // Слой подложки (темная тема)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    async function initMap() {
        // Загружаем карту мира с детализацией регионов (включая субъекты РФ)
        const geojsonRes = await fetch('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/russia.geojson');
        const russiaData = await geojsonRes.json();
        
        // Загружаем общие границы стран мира для фона
        const worldRes = await fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json');
        const worldData = await worldRes.json();

        const alertsRes = await fetch('alerts.json?t=' + Date.now());
        const alertsData = await alertsRes.json();

        // Отображаем сначала все страны мира серым цветом
        L.geoJson(worldData, {
            style: {
                fillColor: '#1e293b',
                weight: 1,
                opacity: 0.4,
                color: '#475569',
                fillOpacity: 0.4
            }
        }).addTo(map);

        // Поверх накладываем сетку регионов с проверкой алертов
        L.geoJson(russiaData, {
            style: function(feature) {
                const name = feature.properties.name ? feature.properties.name.toLowerCase() : "";
                
                let isoCode = null;
                const mapping = {
                    "курская область": "RU-KUR", "орловская область": "RU-ORL", "тверская область": "RU-TVE",
                    "тульская область": "RU-TUL", "калужская область": "RU-KLU", "московская область": "RU-MOS",
                    "белгородская область": "RU-BEL", "брянская область": "RU-BRY", "воронежская область": "RU-VOR"
                };
                
                for (let key in mapping) {
                    if (name.includes(key)) { isoCode = mapping[key]; break; }
                }

                const hasAlert = isoCode && alertsData[isoCode] && alertsData[isoCode].alert === 1;

                return {
                    fillColor: hasAlert ? '#ef4444' : '#10b981',
                    weight: 1.5,
                    opacity: 0.8,
                    color: '#334155',
                    fillOpacity: hasAlert ? 0.6 : 0.2
                };
            },
            onEachFeature: function(feature, layer) {
                layer.bindPopup(`<b>${feature.properties.name}</b>`);
            }
        }).addTo(map);
    }

    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML += '<i style="background: #ef4444"></i> Опасность / Тревога<br>';
        div.innerHTML += '<i style="background: #10b981"></i> Спокойно';
        return div;
    };
    legend.addTo(map);

    initMap();
</script>
</body>
</html>
